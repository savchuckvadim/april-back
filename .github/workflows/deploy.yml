name: Deploy NEST BACK API on push to main

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: ✅ CI запущен
              run: echo "🚀 NESTback api GitHub Actions запущен"

            - name: Deploy to server via SSH
              uses: appleboy/ssh-action@v0.1.10
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  timeout: 30m
                  command_timeout: 90m

                  debug: true
                  script: |
                      set -e
                      echo "🧩 Подключение к серверу NEST API"
                      cd /var/www/html/back.april-app
                      git pull origin main
                      echo "🔍 Проверяю Docker Compose v2..."
                      docker compose version

                      echo "⏳ Запускаю пересборку контейнера nest-api..."
                      old_id=$(docker ps -aq --filter "name=^/nest-api$" | head -n1)

                      if docker buildx version >/dev/null 2>&1; then
                        echo "✅ buildx найден, включаю BuildKit"
                        export DOCKER_BUILDKIT=1
                      else
                        echo "⚠️ buildx не найден, использую legacy builder"
                        export DOCKER_BUILDKIT=0
                      fi

                      docker rm -f nest-api || true

                      if ! docker compose up -d --build; then
                        echo "❌ docker compose build/up завершился с ошибкой"
                        docker compose ps || true
                        docker compose logs --tail 200 api || true
                        exit 1
                      fi

                      echo "⏳ Жду, пока контейнер обновится и станет running/healthy..."
                      timeout=900
                      elapsed=0
                      while true; do
                        new_id=$(docker ps -aq --filter "name=^/nest-api$" | head -n1)
                        status=$(docker inspect -f '{{.State.Status}}' "$new_id" 2>/dev/null || echo "missing")
                        health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$new_id" 2>/dev/null || echo "unknown")

                        if [ -n "$new_id" ] && [ "$new_id" != "$old_id" ] && [ "$status" = "running" ] && { [ "$health" = "healthy" ] || [ "$health" = "none" ]; }; then
                          echo "✅ Контейнер обновился: $old_id -> $new_id (status=$status, health=$health)"
                          break
                        fi

                        if [ "$elapsed" -ge "$timeout" ]; then
                          echo "❌ Таймаут ожидания контейнера nest-api"
                          docker compose ps || true
                          docker logs nest-api --tail 200 || true
                          exit 1
                        fi

                        echo "⌛ Жду... status=$status health=$health elapsed=${elapsed}s"
                        sleep 5
                        elapsed=$((elapsed + 5))
                      done

                      docker compose ps
                      docker logs nest-api --tail 100 || true
